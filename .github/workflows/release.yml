name: Release

on:
  push:
    tags: ["v*"]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  lpk:
    needs: [create-release, docker]
    runs-on: [self-hosted, xiaomoru]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Lazycat appstore login
        env:
          LAZYCAT_USERNAME: ${{ secrets.LAZYCAT_USERNAME }}
          LAZYCAT_PASSWORD: ${{ secrets.LAZYCAT_PASSWORD }}
        run: |
          set -euo pipefail
          TOKEN=$(curl -fsS -X POST https://account.lazycat.cloud/api/login/signin \
            --data-urlencode "username=${LAZYCAT_USERNAME}" \
            --data-urlencode "password=${LAZYCAT_PASSWORD}" \
            | jq -r '.data.token')
          if [ -z "${TOKEN}" ] || [ "${TOKEN}" = "null" ]; then
            echo "::error::Lazycat appstore login failed"
            exit 1
          fi
          echo "::add-mask::${TOKEN}"
          echo "LZC_CLI_TOKEN=${TOKEN}" >> "${GITHUB_ENV}"

      - name: Copy image to Lazycat registry
        id: copy-image
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SRC="ghcr.io/${GITHUB_REPOSITORY,,}:${VERSION}"
          echo "Copying ${SRC}"
          IMG=$(lzc-cli appstore copy-image "${SRC}" --trace-level quiet)
          if [ -z "${IMG}" ]; then
            echo "::error::copy-image returned empty output"
            exit 1
          fi
          echo "Lazycat image: ${IMG}"
          echo "image=${IMG}" >> "${GITHUB_OUTPUT}"

      - name: Pin image in lzc-manifest.yml
        run: |
          set -euo pipefail
          sed -i -E "s|image:[[:space:]]*registry\.lazycat\.cloud[^[:space:]]*|image: ${{ steps.copy-image.outputs.image }}|" lazycat/lzc-manifest.yml
          grep '^[[:space:]]*image:' lazycat/lzc-manifest.yml

      - name: Build lpk
        working-directory: lazycat
        run: lzc-cli project build

      - name: Upload lpk to release
        uses: softprops/action-gh-release@v2
        with:
          files: lazycat/*.lpk
          token: ${{ secrets.GITHUB_TOKEN }}

  binaries:
    needs: create-release
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: selfsync-server
          target: ${{ matrix.target }}
          build-tool: cargo-zigbuild
          archive: $bin-$tag-$target
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}
